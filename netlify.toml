[build]
  command = "mkdir -p dist/book dist/images dist/output && cp -r images/. dist/images/ && cp output/reboot-camp.pdf dist/output/ && cp src/style.css dist/style.css && cp src/style.css dist/book/style.css && cp src/landing.css dist/landing.css && sed 's|\\.\\./images/|images/|g' src/index.html > dist/index.html && sed 's|\\.\\./\\.\\./images/|../images/|g; s|\\.\\./\\.\\./output/|../output/|g' src/book/index.html > dist/book/index.html"
  publish = "dist"
