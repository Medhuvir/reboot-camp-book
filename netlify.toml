[build]
  command = "mkdir -p dist/book && cp -r images dist/images && cp src/style.css dist/style.css && cp src/style.css dist/book/style.css && cp src/landing.css dist/landing.css && sed 's|\\.\\./images/|images/|g' src/landing.html > dist/index.html && cp src/index.html dist/book/index.html"
  publish = "dist"
